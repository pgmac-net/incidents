site_name: Post-Incident Reviews
site_url: https://macro.int.pgmac.net/incidents/
site_description: Internal post-incident review documentation
site_author: pgmac
docs_dir: src/
repo_name: pgmac-net/incidents
repo_url: https://github.com/pgmac-net/incidents/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - navigation.indexes
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Incidents:
    - incidents/index.md
    - PIR Structure Template: incidents/pir-template.md
    - incidents/2026-05-28-pvek8s-post-outage-kubelet-informer-kcm-stall.md
    - incidents/2026-05-23-k8s01-calico-cni-unauthorized-stale-kubeconfig.md
    - incidents/2026-05-18-k8s03-extended-recovery-kine-watch-vxlan-route-corruption.md
    - incidents/2026-05-17-k8s03-pleg-deadlock-stale-ipam-blocks.md
    - incidents/2026-05-16-microk8s-1.35-upgrade-cgroup-v2-containerd-disk-pressure.md
    - incidents/2026-05-15-awx-pod-pending-calico-rbac-dqlite-write-storm.md
    - incidents/2026-04-12-pvek8s-dqlite-quorum-loss-complete-cluster-outage.md
    - incidents/2026-04-02-dqlite-snapshot-crash-loop-watch-stream-failure.md
    - incidents/2026-03-30-sonarr-iscsi-hairpin-containercreating.md
    - incidents/2026-03-28-radarr-jiva-replica-divergence-second.md
    - incidents/2026-03-28-arc-pods-pending-kubelet-sync-stall.md
    - incidents/2026-02-22-radarr-openebs-jiva-replica-divergence.md
    - incidents/2026-01-06-cluster-cascade-failure.md
  - Runbooks:
    - runbooks/index.md
    - runbooks/dqlite-write-contention.md
    - runbooks/jiva-ctrl-eviction-iscsi-ro-filesystem.md
    - runbooks/jiva-ctrl-node-rolling-restart.md
    - runbooks/jiva-csi-mount-proliferation.md
    - runbooks/kcm-stale-terminating-replicas.md
    - runbooks/kubelet-volume-manager-stall.md
    - runbooks/kubelet-silent-stall.md
    - runbooks/calico-cni-unauthorized.md
    - runbooks/k8s-upgrade-validation.md
  - Tags: tags.md

extra:
  analytics:
    provider: google
    property: G-4TK0898KNM
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pgmac
